<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer navy ring -->
  <circle cx="50" cy="50" r="49" fill="#1e3a5f"/>
  <!-- White interior -->
  <circle cx="50" cy="50" r="41" fill="#ffffff"/>

  <!-- Clip content to interior circle -->
  <clipPath id="inner">
    <circle cx="50" cy="50" r="41"/>
  </clipPath>

  <g clip-path="url(#inner)">
    <!-- Sun rays radiating from sun center at (50, 29) -->
    <line x1="50" y1="19" x2="50" y2="7"  stroke="#1e3a5f" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="57" y1="21" x2="64" y2="11" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round"/>
    <line x1="62" y1="27" x2="74" y2="20" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round"/>
    <line x1="64" y1="34" x2="78" y2="31" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round"/>
    <line x1="43" y1="21" x2="36" y2="11" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round"/>
    <line x1="38" y1="27" x2="26" y2="20" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round"/>
    <line x1="36" y1="34" x2="22" y2="31" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round"/>

    <!-- Sun body -->
    <circle cx="50" cy="29" r="11" fill="#1e3a5f"/>

    <!-- Water wave lines in lower portion -->
    <path d="M9,53 Q22,48 35,53 Q48,58 61,53 Q74,48 91,53"
          fill="none" stroke="#1e3a5f" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M9,62 Q22,57 35,62 Q48,67 61,62 Q74,57 91,62"
          fill="none" stroke="#1e3a5f" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M9,71 Q22,66 35,71 Q48,76 61,71 Q74,66 91,71"
          fill="none" stroke="#1e3a5f" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M12,80 Q25,75 38,80 Q51,85 64,80 Q77,75 88,80"
          fill="none" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round"/>
    <path d="M15,89 Q28,84 41,89 Q54,94 67,89 Q80,84 85,89"
          fill="none" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
